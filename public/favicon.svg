<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Личный бюджет">
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2f5245"/>
      <stop offset="1" stop-color="#1a2f28"/>
    </linearGradient>
    <linearGradient id="wallet" x1="14" y1="18" x2="50" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7ec4b0"/>
      <stop offset="1" stop-color="#4f9d88"/>
    </linearGradient>
    <linearGradient id="coin" x1="22" y1="34" x2="42" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe066"/>
      <stop offset="0.5" stop-color="#f5c518"/>
      <stop offset="1" stop-color="#d4a012"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- wallet body -->
  <rect x="12" y="22" width="40" height="22" rx="5" fill="url(#wallet)" filter="url(#soft)"/>
  <path d="M12 26h40" stroke="#3d7a68" stroke-width="0.8" opacity="0.5"/>
  <!-- stitching -->
  <path d="M14 28v14" stroke="#3d7a68" stroke-width="0.6" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <!-- wallet flap -->
  <path d="M44 22h6a3 3 0 0 1 3 3v16a3 3 0 0 1-3 3h-6" fill="#4f9d88"/>
  <circle cx="50" cy="33" r="2.2" fill="#f5c518"/>
  <!-- card -->
  <rect x="16" y="16" width="28" height="12" rx="2.5" fill="#1e3530"/>
  <rect x="18" y="20" width="5" height="4" rx="1" fill="#f5c518" opacity="0.9"/>
  <circle cx="38" cy="22" r="2.5" fill="#c0392b" opacity="0.85"/>
  <circle cx="41" cy="22" r="2.5" fill="#f39c12" opacity="0.85"/>
  <!-- coin -->
  <circle cx="32" cy="44" r="13" fill="url(#coin)" filter="url(#soft)"/>
  <circle cx="32" cy="44" r="10.5" fill="none" stroke="#d4a012" stroke-width="0.8" opacity="0.5"/>
  <!-- question mark -->
  <path
    d="M32 37.5c2.2 0 3.5 1.2 3.5 2.8 0 1.4-0.9 2.2-2.4 2.8l-0.6 0.2c-0.5 0.2-0.8 0.6-0.8 1.1v0.6"
    stroke="#1a2f28"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="32" cy="48.5" r="1.3" fill="#1a2f28"/>
</svg>
