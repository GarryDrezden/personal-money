<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="pink" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe8f0"/>
      <stop offset="1" stop-color="#ffd1e0"/>
    </linearGradient>
    <!-- Hello Kitty head -->
    <g id="kitty">
      <ellipse cx="0" cy="8" rx="34" ry="30" fill="#fff" opacity="0.92"/>
      <ellipse cx="-28" cy="-18" rx="10" ry="14" fill="#fff" opacity="0.92"/>
      <ellipse cx="28" cy="-18" rx="10" ry="14" fill="#fff" opacity="0.92"/>
      <circle cx="-10" cy="4" r="2.2" fill="#333"/>
      <circle cx="10" cy="4" r="2.2" fill="#333"/>
      <ellipse cx="0" cy="10" rx="2.8" ry="1.8" fill="#fbbf24"/>
      <!-- bow -->
      <ellipse cx="-22" cy="-8" rx="7" ry="5" fill="#ef4444" opacity="0.95"/>
      <ellipse cx="-30" cy="-8" rx="5" ry="4" fill="#ef4444" opacity="0.95"/>
      <ellipse cx="-14" cy="-8" rx="5" ry="4" fill="#ef4444" opacity="0.95"/>
      <circle cx="-22" cy="-8" r="2.2" fill="#dc2626"/>
    </g>
    <!-- small bow -->
    <g id="bow">
      <ellipse cx="0" cy="0" rx="8" ry="5.5" fill="#f472b6" opacity="0.55"/>
      <ellipse cx="-7" cy="0" rx="5.5" ry="4" fill="#f472b6" opacity="0.55"/>
      <ellipse cx="7" cy="0" rx="5.5" ry="4" fill="#f472b6" opacity="0.55"/>
      <circle cx="0" cy="0" r="2" fill="#ec4899" opacity="0.65"/>
    </g>
  </defs>
  <rect width="240" height="240" fill="url(#pink)"/>
  <!-- polka dots -->
  <circle cx="30" cy="30" r="4" fill="#fff" opacity="0.45"/>
  <circle cx="90" cy="60" r="3" fill="#fff" opacity="0.35"/>
  <circle cx="180" cy="40" r="5" fill="#fff" opacity="0.4"/>
  <circle cx="210" cy="120" r="3.5" fill="#fff" opacity="0.35"/>
  <circle cx="50" cy="190" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="160" cy="200" r="3" fill="#fff" opacity="0.35"/>
  <!-- tiled characters -->
  <use href="#kitty" x="60" y="70" transform="rotate(-8 60 70)" opacity="0.38"/>
  <use href="#kitty" x="175" y="155" transform="rotate(12 175 155)" opacity="0.32"/>
  <use href="#kitty" x="120" y="210" transform="rotate(-5 120 210) scale(0.75)" opacity="0.28"/>
  <use href="#bow" x="200" y="55" transform="rotate(20 200 55)" opacity="0.7"/>
  <use href="#bow" transform="translate(35 130) rotate(-15)" opacity="0.65"/>
  <use href="#bow" x="145" y="25" transform="rotate(8 145 25) scale(0.8)" opacity="0.6"/>
  <use href="#bow" x="100" y="145" transform="rotate(-22 100 145) scale(0.7)" opacity="0.55"/>
</svg>
