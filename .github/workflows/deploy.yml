name: Deploy to FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy-bundle
          cp -r dist/* deploy-bundle/
          cp -r api deploy-bundle/api
          cp .htaccess deploy-bundle/
          mkdir -p deploy-bundle/data
          cp data/.htaccess deploy-bundle/data/
          rm -f deploy-bundle/api/config.php

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-bundle/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/data/**
            **/*.sqlite
            **/server/**
